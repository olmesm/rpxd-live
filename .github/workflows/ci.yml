name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prisma generate + db (todos example)
        run: bun run setup
        working-directory: examples/kitchen-sink

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: TSDoc on public APIs (§17)
        run: bun scripts/check-tsdoc.ts

      - name: Unit tests
        run: bun run test

      - name: Bun-runtime tests (adapters + conformance)
        run: bun test packages/rsc/test-bun packages/server-bun/test-bun packages/storage-sqlite/test-bun examples/kitchen-sink/test-bun packages/cli/test-bun

  node-runtime:
    name: Node runtime (Node 24 — node:http + better-sqlite3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # bun install builds the workspace node_modules that Node resolves
      # (per-package symlinks into the store) — npm/pnpm can't, the packages
      # use the `workspace:*` protocol. Node 24 is in PATH first, so the
      # better-sqlite3 node-gyp build targets it.
      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prisma generate + db (todos example)
        run: bun run setup
        working-directory: examples/kitchen-sink

      # better-sqlite3 is a V8-ABI native addon; rebuild it against the pinned
      # Node so vitest's Node workers load a matching binary (belt-and-braces:
      # the install above already targets Node 24).
      - name: Rebuild better-sqlite3 for Node 24
        run: |
          set -euxo pipefail
          DIR=$(find node_modules/.bun -maxdepth 4 -type d -path '*better-sqlite3@*/node_modules/better-sqlite3' | head -1)
          test -n "$DIR"
          ( cd "$DIR" && npx --yes node-gyp rebuild )

      # The whole Vitest suite under the real Node binary (not Bun): proves the
      # node:http adapter, sqliteNode (better-sqlite3), and the library run on
      # Node 24 — the supported runtime floor.
      - name: Unit tests (real Node)
        run: node node_modules/vitest/vitest.mjs run

      # End-to-end deploy smoke: build the example (Bun/Vite), then serve it with
      # `rpxd start` under the real Node binary and hit it over HTTP. Proves the
      # whole production path — config load, nodeAdapter, SSR, static assets —
      # runs on Node, not just the unit adapters. Bun equivalent:
      # packages/cli/test-bun/build-start.test.ts.
      - name: rpxd start deploy smoke (real Node)
        working-directory: examples/kitchen-sink
        run: |
          set -euxo pipefail
          bun run "$GITHUB_WORKSPACE/packages/cli/src/cli.ts" build
          PORT=3799 node "$GITHUB_WORKSPACE/packages/cli/src/cli.ts" start &
          SPID=$!
          for _ in $(seq 1 30); do
            curl -sf "http://localhost:3799/" >/dev/null && break || sleep 1
          done
          body=$(curl -sf "http://localhost:3799/")
          echo "$body" | grep -q 'id="__rpxd"'
          asset=$(printf '%s' "$body" | grep -oE '/assets/[^"]+\.js' | head -1)
          test -n "$asset"
          curl -sf -o /dev/null "http://localhost:3799${asset}"
          kill "$SPID"

  generators:
    name: Generators (init + scaffold + run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Programmatic acceptance: init → scaffold → typecheck → build → serve.
      - name: Generator acceptance test
        run: bun test packages/cli/test-bun/generators.test.ts

      # Binary smoke: drive the real `rpxd` CLI end to end. The generated app
      # resolves @rpxd/* / react / vite via the todos example's node_modules
      # (a superset of a generated app's deps) — the same shape `bun install`
      # would produce for a published app.
      - name: rpxd init + scaffold via the CLI binary
        run: |
          set -euxo pipefail
          CLI="$GITHUB_WORKSPACE/packages/cli/src/cli.ts"
          bun "$CLI" init .ci-gen --no-db --force
          ln -s "$GITHUB_WORKSPACE/examples/kitchen-sink/node_modules" .ci-gen/node_modules
          cd .ci-gen
          bun "$CLI" scaffold Notes Note notes title:string pinned:boolean
          bunx tsc --noEmit -p tsconfig.json
          bun node_modules/.bin/rpxd build

      # DB + relation path: init auth+db, scaffold a resource with a references
      # (belongs_to) + json + date, append the model, run `prisma format` (which
      # inserts the inverse relation on User), generate the client, and typecheck.
      - name: rpxd scaffold with a relation (append + prisma format + typecheck)
        run: |
          set -euxo pipefail
          CLI="$GITHUB_WORKSPACE/packages/cli/src/cli.ts"
          bun "$CLI" init .ci-gen-db --force
          ln -s "$GITHUB_WORKSPACE/examples/kitchen-sink/node_modules" .ci-gen-db/node_modules
          cd .ci-gen-db
          bun "$CLI" scaffold Posts Post posts title:string author_id:references:User meta:json due:date
          grep -q "@relation(fields: \[authorId\]" prisma/schema.prisma
          DATABASE_URL="file:./prisma/dev.db" bunx prisma format
          grep -q "posts.*Post\[\]" prisma/schema.prisma   # inverse added by prisma format
          DATABASE_URL="file:./prisma/dev.db" bun node_modules/.bin/prisma generate
          bunx tsc --noEmit -p tsconfig.json

  scaffold:
    name: Scaffold (${{ matrix.name }})
    runs-on: ubuntu-latest
    # Matrix over scaffold shapes: init a fresh app, scaffold a resource, then
    # run the test the scaffold itself generated — a page's testLive route test
    # (mount → rpcs → patches) or an http route's domain test. The generated app
    # is created as a workspace member so `bun install` links @rpxd/* + vitest,
    # exactly as a published app would resolve after install.
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: page-toggle
            cmd: scaffold Todos Todo todos text:string done:boolean
          - name: page-plain
            cmd: scaffold Notes Note notes title:string body:text
          - name: http-route
            cmd: scaffold Feeds Feed feeds url:string --kind http
          - name: references
            cmd: scaffold Posts Post posts title:string author_id:references:User meta:json
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Scaffold then run the generated test
        run: |
          set -euxo pipefail
          CLI="$GITHUB_WORKSPACE/packages/cli/src/cli.ts"
          APP="examples/_gen_${{ matrix.name }}"
          bun "$CLI" init "$APP" --no-db --force
          ( cd "$APP" && bun "$CLI" ${{ matrix.cmd }} )
          # Link the new workspace member (vitest + @rpxd/* into its node_modules).
          bun install
          ( cd "$APP" && bun run test )

  e2e:
    name: e2e (all transport × rsc combos)
    runs-on: ubuntu-latest
    # A backstop against a stuck runner (one hung combo can't wedge the job for
    # hours the way the old matrix occasionally did).
    timeout-minutes: 15
    # One job, four combos run sequentially over a single setup. The matrix used
    # to pay bun install + prisma + the ~45s chromium install four times over for
    # a ~15s suite; here that fixed cost is paid once. SSE/WS are meant to be
    # API-identical (§11) and rsc is opt-in (§16); rsc-only specs skip themselves
    # on --no-rsc. Each combo writes its report/traces to a combo-specific dir so
    # the uploaded artifact keeps all four. The slow-booting sse/rsc=off combo
    # runs last, and `!cancelled()` keeps every combo running even if one fails
    # (the fail-fast: false behaviour the matrix had).
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prisma generate + db (todos example)
        run: bun run setup
        working-directory: examples/kitchen-sink

      - name: Install chromium (once, shared by all combos)
        run: bunx playwright install --with-deps chromium
        working-directory: e2e

      - name: "e2e — ws, rsc=on"
        run: bunx playwright test
        working-directory: e2e
        env:
          RPXD_TRANSPORT: ws
          RPXD_RSC: "true"
          PLAYWRIGHT_HTML_DIR: playwright-report/ws-rsc-on
          PLAYWRIGHT_OUTPUT_DIR: test-results/ws-rsc-on

      - name: "e2e — ws, rsc=off"
        if: ${{ !cancelled() }}
        run: bunx playwright test
        working-directory: e2e
        env:
          RPXD_TRANSPORT: ws
          RPXD_RSC: "false"
          PLAYWRIGHT_HTML_DIR: playwright-report/ws-rsc-off
          PLAYWRIGHT_OUTPUT_DIR: test-results/ws-rsc-off

      - name: "e2e — sse, rsc=on"
        if: ${{ !cancelled() }}
        run: bunx playwright test
        working-directory: e2e
        env:
          RPXD_TRANSPORT: sse
          RPXD_RSC: "true"
          PLAYWRIGHT_HTML_DIR: playwright-report/sse-rsc-on
          PLAYWRIGHT_OUTPUT_DIR: test-results/sse-rsc-on

      - name: "e2e — sse, rsc=off (slow boot; last)"
        if: ${{ !cancelled() }}
        run: bunx playwright test
        working-directory: e2e
        env:
          RPXD_TRANSPORT: sse
          RPXD_RSC: "false"
          PLAYWRIGHT_HTML_DIR: playwright-report/sse-rsc-off
          PLAYWRIGHT_OUTPUT_DIR: test-results/sse-rsc-off

      - name: Upload Playwright results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            e2e/playwright-report
            e2e/test-results
          retention-days: 5
          if-no-files-found: ignore
