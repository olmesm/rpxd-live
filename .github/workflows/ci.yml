name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prisma generate + db (todos example)
        run: bun run setup
        working-directory: examples/todos

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: TSDoc on public APIs (§17)
        run: bun scripts/check-tsdoc.ts

      - name: Unit tests
        run: bun run test

      - name: Bun-runtime tests (smoke + adapters)
        run: bun test spikes/vite-bun-ssr spikes/rsc-flight packages/server-bun/test-bun packages/storage-sqlite/test-bun examples/todos/test-bun packages/cli/test-bun

  e2e:
    name: e2e (${{ matrix.transport }}, rsc=${{ matrix.rsc }})
    runs-on: ubuntu-latest
    # Matrix the render/transport combos: SSE/WS are meant to be API-identical
    # (§11) and rsc is opt-in (§16). rsc-only specs skip on the --no-rsc combos.
    strategy:
      fail-fast: false
      matrix:
        transport: [sse, ws]
        rsc: ["true", "false"]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prisma generate + db (todos example)
        run: bun run setup
        working-directory: examples/todos

      - name: Install chromium
        run: bunx playwright install --with-deps chromium
        working-directory: e2e

      - name: Run e2e suite
        run: bunx playwright test
        working-directory: e2e
        env:
          RPXD_TRANSPORT: ${{ matrix.transport }}
          RPXD_RSC: ${{ matrix.rsc }}
