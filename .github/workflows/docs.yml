name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs-site/**"
      - "packages/**/src/**"
      - "spec.md"
      - "docs/**"
      - ".github/workflows/docs.yml"
  # Build (but don't deploy) on PRs so a broken docs build blocks the merge.
  pull_request:
    paths:
      - "docs-site/**"
      - "packages/**/src/**"
      - "spec.md"
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight deploy at a time; don't cancel a running publish.
concurrency:
  group: docs-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # TypeDoc reads the packages' TSDoc straight from source (@rpxd/* are
      # workspace symlinks), so no package build step is needed.
      - name: Build site
        run: bun run build
        working-directory: docs-site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    # Only publish from main; on PRs the build job runs as a check and stops here.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
